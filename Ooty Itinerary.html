<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itinerary Planner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--surf:#0d0d1a;--surf2:#121220;
  --txt:#e8edf5;--muted:#6a7a96;--dim:#3a4560;
  --ac:#00c8a8;--acs:rgba(0,200,168,.12);--acg:rgba(0,200,168,.3);
  --bd:#181828;--bdm:#222238;--bdh:#2e2e50;
  --red:#f06c6c;--reds:rgba(240,108,108,.1);
  --ok:#2dd4b0;--warn:#f59e0b;
  --nt:#8b5cf6;--nts:rgba(139,92,246,.12);
  --r:14px;--rs:8px;
  --s1:0 4px 16px rgba(0,0,0,.4);--s2:0 12px 40px rgba(0,0,0,.7)
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);
  line-height:1.6;padding:20px 16px 130px;max-width:480px;margin:0 auto;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E")}

/* ── base inputs ── */
input,select,textarea{font-family:'DM Sans',sans-serif;color:inherit;
  background:transparent;border:none;border-bottom:1px dashed transparent;
  padding:3px 0;transition:border-color .2s,color .2s}
input:hover:not([type="checkbox"]):not([type="file"]),
select:hover,textarea:hover{border-bottom-color:var(--bdh)}
input:focus,select:focus,textarea:focus{outline:none;border-bottom:1px solid var(--ac)}
input::placeholder,textarea::placeholder{color:var(--dim)}
input[type="file"]{display:none!important}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

/* ── top bar ── */
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;position:relative;z-index:2}
.save-status{display:flex;align-items:center;gap:6px;background:var(--surf);
  border:1px solid var(--bdm);padding:5px 12px;border-radius:100px;margin-right:auto}
.save-dot{width:7px;height:7px;background:var(--ok);border-radius:50%;
  box-shadow:0 0 6px var(--ok);transition:background .3s,box-shadow .3s}
.save-dot.saving{background:var(--warn);box-shadow:0 0 6px var(--warn);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-reset{color:var(--muted);background:var(--surf);border:1px solid var(--bdm);
  cursor:pointer;font-size:.78rem;font-weight:500;padding:5px 12px;border-radius:100px;
  font-family:inherit;transition:.2s;white-space:nowrap}
.btn-reset:hover{color:var(--red);border-color:var(--red);background:var(--reds)}

/* ── Mode toggle ── */
.mode-toggle{display:flex;align-items:center;background:var(--surf2);
  border:1px solid var(--bdm);border-radius:100px;padding:3px;gap:2px}
.mt-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:.78rem;font-weight:600;color:var(--muted);padding:5px 14px;
  border-radius:100px;transition:.2s;white-space:nowrap}
.mt-btn.active{background:var(--ac);color:#000}
.mt-btn:not(.active):hover{color:var(--txt)}

/* ── action bar ── */
.action-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(13,13,26,.94);backdrop-filter:blur(20px) saturate(180%);
  padding:12px 20px;border-radius:100px;display:flex;gap:16px;align-items:center;
  box-shadow:var(--s2),0 0 0 1px rgba(255,255,255,.05);border:1px solid var(--bdm);z-index:1000;
  max-width:calc(100% - 32px)}
.ab-div{width:1px;height:26px;background:var(--bdm);flex-shrink:0}
.stat{display:flex;flex-direction:column}
.stat-lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600}
.stat-val{font-size:.95rem;font-weight:700;color:var(--ac);font-family:'Syne',sans-serif}
.btn-primary{background:var(--ac);color:#000;border:none;padding:9px 18px;border-radius:100px;
  font-weight:700;cursor:pointer;transition:.25s;font-size:.84rem;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-primary:hover{background:#00e0c0;box-shadow:0 0 20px var(--acg);transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--txt);border:1px solid var(--bdh);padding:9px 14px;
  border-radius:100px;font-weight:500;cursor:pointer;transition:.2s;font-size:.84rem;
  font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-secondary:hover{background:var(--surf2);border-color:var(--muted)}

/* ── doc header ── */
.doc-header{margin-bottom:40px;position:relative;z-index:1}
.cover-wrap{width:100%;height:200px;border-radius:var(--r);overflow:hidden;
  margin-bottom:20px;position:relative;border:1px solid var(--bdm);
  background:linear-gradient(135deg,#0d0d1a 0%,#12122a 50%,#0a1020 100%)}
.cover-wrap::before{content:'';position:absolute;inset:0;opacity:.4;
  background-image:linear-gradient(var(--bd) 1px,transparent 1px),
    linear-gradient(90deg,var(--bd) 1px,transparent 1px);background-size:40px 40px}
.cover-wrap::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 60%,var(--acs) 0%,transparent 60%)}
.cover-wrap img{width:100%;height:100%;object-fit:cover;display:none;opacity:.85;position:relative;z-index:2}
.cover-lbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(7,7,15,.7);padding:8px 18px;border-radius:100px;font-size:.78rem;
  font-weight:600;cursor:pointer;border:1px solid var(--ac);color:var(--ac);
  backdrop-filter:blur(8px);transition:.2s;z-index:3;white-space:nowrap}
.cover-lbl:hover{background:var(--ac);color:#000}
.title-input{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;
  width:100%;color:var(--txt);letter-spacing:-.03em;line-height:1.15}
.subtitle-input{font-size:.9rem;width:100%;color:var(--muted);margin-top:6px}

/* ── day container ── */
.day-container{margin-bottom:40px;position:relative;z-index:1;animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.day-header{display:flex;align-items:center;gap:10px;margin-bottom:22px;position:relative;flex-wrap:wrap}
.day-header::after{content:'';position:absolute;bottom:-10px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--ac) 0%,var(--bdm) 40%,transparent 100%);opacity:.5}
.day-badge{display:flex;align-items:center;gap:4px;flex-shrink:0;
  background:var(--acs);border:1px solid var(--ac);border-radius:var(--rs);padding:3px 10px}
.day-badge-lbl{font-family:'Syne',sans-serif;font-size:.62rem;font-weight:700;
  color:var(--ac);letter-spacing:.12em;text-transform:uppercase}
.day-badge-num{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:800;
  color:var(--ac);width:26px;text-align:center;padding:0!important;
  border-bottom:1px dashed rgba(0,200,168,.35)!important}
.day-badge-num:focus{border-bottom-color:var(--ac)!important}
.day-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;
  width:auto;min-width:60px;color:var(--txt)}
.day-date-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
.day-date{font-size:.8rem;color:var(--muted);width:130px}
.dow-badge{font-size:.72rem;font-weight:600;color:var(--ac);
  background:var(--acs);border:1px solid rgba(0,200,168,.25);
  padding:2px 8px;border-radius:100px;white-space:nowrap;display:none}
.delete-day-btn{color:var(--dim);cursor:pointer;border:1px solid transparent;background:none;
  font-size:.78rem;font-weight:500;font-family:inherit;padding:4px 10px;
  border-radius:100px;transition:.2s;flex-shrink:0}
.delete-day-btn:hover{color:var(--red);border-color:var(--red);background:var(--reds)}

/* ── timeline ── */
.stops-wrap{position:relative;padding-left:24px}
.stops-wrap::before{content:'';position:absolute;left:7px;top:12px;bottom:12px;width:2px;
  background:linear-gradient(to bottom,var(--ac) 0%,var(--bdm) 60%,transparent 100%);opacity:.5}

/* ── stop card ── */
.stop-card{background:var(--surf);border:1px solid var(--bdm);border-radius:var(--r);
  padding:16px 16px 12px 28px;margin-bottom:12px;position:relative;
  box-shadow:var(--s1);transition:border-color .2s,box-shadow .2s}
.stop-card:hover{border-color:var(--bdh);box-shadow:var(--s2)}
.stop-card::after{content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:3px;background:var(--ac);border-radius:0 2px 2px 0;opacity:0;transition:opacity .2s}
.stop-card:hover::after{opacity:.6}
.stop-card::before{content:'';position:absolute;left:-22px;top:22px;
  width:10px;height:10px;background:var(--ac);border:2px solid var(--bg);
  border-radius:50%;z-index:2;box-shadow:0 0 8px var(--acg);transition:transform .2s}
.stop-card:hover::before{transform:scale(1.2)}
.drag-handle{position:absolute;left:8px;top:18px;color:var(--dim);cursor:grab;
  font-size:1rem;user-select:none}
.drag-handle:active{cursor:grabbing}

.stop-row-1{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:nowrap}
.time-input{font-size:.95rem;font-weight:600;color:var(--ac);width:80px;flex-shrink:0}
.time-input::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer}
.loc-input{font-size:.95rem;font-weight:600;flex-grow:1;min-width:0}
.cost-wrap{display:flex;align-items:center;background:rgba(0,200,168,.06);
  padding:4px 10px;border-radius:var(--rs);border:1px solid var(--bdm);gap:2px;
  transition:border-color .2s;flex-shrink:0}
.cost-wrap:focus-within{border-color:var(--ac)}
.cost-wrap span{color:var(--ac);font-size:.8rem;font-weight:600}
.cost-wrap input{font-size:.82rem;font-weight:600;width:52px;color:var(--txt);border:none!important}
.del-stop{color:var(--dim);cursor:pointer;border:none;background:none;
  font-size:1rem;padding:3px 5px;border-radius:6px;transition:.2s;flex-shrink:0}
.del-stop:hover{color:var(--red);background:var(--reds)}

.stop-row-2{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.cat-select{font-size:.78rem;font-weight:500;color:var(--muted);
  background:var(--surf2);padding:4px 8px;border-radius:var(--rs);
  border:1px solid var(--bdm);cursor:pointer;font-family:inherit;flex-shrink:0}
.cat-select option{background:var(--surf2)}
.maps-input{font-size:.78rem;color:var(--ac);flex-grow:1;min-width:0;overflow:hidden;text-overflow:ellipsis}

/* ── toolbar ── */
.stop-toolbar{display:flex;gap:5px;border-top:1px solid var(--bd);padding-top:10px;margin-top:4px;flex-wrap:wrap}
.tool-btn{background:none;border:1px solid transparent;color:var(--muted);font-size:.74rem;
  font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;
  padding:4px 9px;border-radius:var(--rs);transition:.2s;font-family:inherit;white-space:nowrap}
.tool-btn:hover{background:var(--surf2);color:var(--txt);border-color:var(--bdm)}
.tool-btn.active{color:var(--ac);border-color:var(--ac);background:var(--acs)}

/* ── expand sections ── */
.expand-sec{margin-top:10px;display:none;animation:slideIn .2s ease both}
@keyframes slideIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.notes-area{width:100%;min-height:56px;font-size:.84rem;color:var(--muted);
  background:rgba(255,255,255,.02);border:1px solid var(--bdm)!important;
  border-radius:var(--rs);padding:10px 12px;resize:vertical;
  font-family:'DM Sans',sans-serif;transition:border-color .2s}
.notes-area:focus{border-color:var(--ac)!important;color:var(--txt)}

/* ── todos ── */
.todo-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;
  border-bottom:1px solid var(--bd);font-size:.84rem}
.todo-item:last-of-type{border-bottom:none}
.todo-item input[type="checkbox"]{margin-top:3px;width:14px;height:14px;
  accent-color:var(--ac);cursor:pointer;flex-shrink:0}
.todo-item span{flex-grow:1;outline:none;color:var(--muted)}
.todo-item input[type="checkbox"]:checked+span{text-decoration:line-through;opacity:.5}
.todo-input{width:100%;font-size:.8rem;padding:7px 10px;background:var(--surf2);
  border:1px dashed var(--bdm)!important;border-radius:var(--rs);margin-top:6px}
.todo-input:focus{border-color:var(--ac)!important}

/* ── gallery ── */
.gallery{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.gal-img{position:relative;width:76px;height:76px;border-radius:10px;
  overflow:hidden;border:1px solid var(--bdm)}
.gal-img img{width:100%;height:100%;object-fit:cover;display:block}
.gal-rm{position:absolute;top:4px;right:4px;background:rgba(7,7,15,.8);color:#fff;
  border:none;border-radius:50%;width:17px;height:17px;font-size:9px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.2s}
.gal-rm:hover{background:var(--red)}

/* ── transit between stops ── */
.transit-block{margin:2px 0 10px -14px;background:var(--surf2);
  border:1px solid var(--bdm);border-radius:12px;padding:8px 12px;
  position:relative;z-index:2;transition:border-color .2s}
.transit-block:hover{border-color:var(--bdh)}
.transit-top{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.mode-pill{display:flex;align-items:center;gap:3px;padding:3px 9px;border-radius:100px;
  border:1px solid var(--bdm);background:transparent;cursor:pointer;font-size:.72rem;
  font-weight:500;color:var(--muted);font-family:'DM Sans',sans-serif;transition:.18s;user-select:none}
.mode-pill:hover{border-color:var(--bdh);color:var(--txt);background:var(--surf)}
.mode-pill.selected{background:var(--acs);border-color:var(--ac);color:var(--ac)}
.transit-bottom{display:flex;gap:6px;margin-top:7px;padding-top:7px;border-top:1px solid var(--bd)}
.t-field{display:flex;align-items:center;gap:5px;background:var(--surf);
  border:1px solid var(--bdm);border-radius:var(--rs);padding:3px 9px;flex:1;transition:border-color .2s}
.t-field:focus-within{border-color:var(--ac)}
.t-flbl{font-size:.66rem;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.t-field input{font-size:.78rem;color:var(--muted);flex:1;min-width:40px;border:none!important}
.t-field input::placeholder{color:var(--dim)}
.t-field input:focus{color:var(--txt)}

/* ── overnight day connector ── */
.day-connector{position:relative;z-index:1;margin:0 0 28px;animation:fadeUp .3s ease both}
.dc-inner{background:linear-gradient(135deg,rgba(139,92,246,.1) 0%,rgba(13,13,26,.98) 100%);
  border:1px solid rgba(139,92,246,.35);border-radius:var(--r);
  padding:14px 16px;position:relative;overflow:hidden}
.dc-inner::before{content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--nt);border-radius:0 2px 2px 0;opacity:.8}
.dc-inner::after{content:'✦  ✦  ✦';position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-size:.45rem;letter-spacing:6px;color:rgba(139,92,246,.2);pointer-events:none}
.dc-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.dc-moon{width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.4);
  display:flex;align-items:center;justify-content:center;font-size:.9rem}
.dc-title{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;
  color:#a78bfa;letter-spacing:.08em;text-transform:uppercase}
.dc-sub{font-size:.7rem;color:var(--muted);margin-top:1px}
.dc-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dc-pill{display:flex;align-items:center;gap:3px;padding:4px 10px;border-radius:100px;
  border:1px solid var(--bdm);background:transparent;cursor:pointer;font-size:.74rem;
  font-weight:500;color:var(--muted);font-family:'DM Sans',sans-serif;transition:.18s;user-select:none}
.dc-pill:hover{border-color:rgba(139,92,246,.5);color:#c4b5fd;background:var(--nts)}
.dc-pill.selected{background:var(--nts);border-color:var(--nt);color:#c4b5fd}
.dc-field{display:flex;align-items:center;gap:5px;background:rgba(7,7,15,.5);
  border:1px solid var(--bdm);border-radius:var(--rs);padding:4px 10px;
  min-width:90px;flex:1;transition:border-color .2s}
.dc-field:focus-within{border-color:var(--nt)}
.dc-flbl{font-size:.64rem;font-weight:600;color:rgba(139,92,246,.6);
  text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.dc-field input{font-size:.78rem;color:var(--muted);flex:1;min-width:40px;border:none!important}
.dc-field input::placeholder{color:var(--dim)}
.dc-field input:focus{color:#c4b5fd}
.dc-del{position:absolute;top:10px;right:12px;color:var(--dim);cursor:pointer;border:none;
  background:none;font-size:.76rem;font-family:inherit;padding:3px 7px;border-radius:100px;transition:.2s}
.dc-del:hover{color:var(--red);background:var(--reds)}

/* ── add stop ── */
.add-controls{display:flex;gap:10px;margin-top:16px;padding-left:24px}
.btn-add-stop{background:var(--surf);border:1px dashed var(--bdh);color:var(--muted);
  padding:11px;border-radius:var(--r);width:100%;font-weight:500;cursor:pointer;
  transition:.25s;font-size:.84rem;font-family:'DM Sans',sans-serif}
.btn-add-stop:hover{border-color:var(--ac);color:var(--ac);background:var(--acs)}

/* ══════════════════════════════════════════
   VIEW MODE
══════════════════════════════════════════ */
body.view-mode .edit-only{display:none!important}
body.view-mode .drag-handle{display:none!important}

/* day header in view mode */
body.view-mode .day-header{flex-wrap:nowrap}
body.view-mode .day-badge{background:var(--acs);border-color:var(--ac)}
body.view-mode .delete-day-btn{display:none}

/* stop card in view mode — clean & compact */
body.view-mode .stop-card{
  padding:14px 12px 10px 26px;
  border:none;border-bottom:1px solid var(--bdm);
  border-radius:0;box-shadow:none;background:transparent;margin-bottom:0}
body.view-mode .stop-card:first-of-type{border-top:1px solid var(--bdm)}
body.view-mode .stop-card::after{display:none}
body.view-mode .stop-card:hover{border-color:var(--bdm)}
body.view-mode .stop-card::before{left:-20px;top:20px}
body.view-mode .stop-row-1{flex-wrap:nowrap;margin-bottom:4px}
body.view-mode .stop-row-2{margin-bottom:6px}
body.view-mode .cost-wrap{background:none;border:none;padding:0}
body.view-mode .cost-wrap span{font-size:.8rem}
body.view-mode .cost-wrap input{font-size:.84rem;pointer-events:none}
body.view-mode .del-stop{display:none}
body.view-mode .cat-select{border:none;background:none;padding:0;pointer-events:none}
body.view-mode .maps-input{pointer-events:none}
body.view-mode .stop-toolbar{display:none}
body.view-mode .notes-area{border:none!important;background:none!important;
  resize:none;pointer-events:none;padding:0;font-size:.82rem;color:var(--muted);min-height:0}
body.view-mode .todo-input{display:none}
body.view-mode .todo-item input[type="checkbox"]{pointer-events:none}
body.view-mode .gal-rm{display:none}
body.view-mode .expand-sec{pointer-events:none}

/* transit in view mode */
body.view-mode .transit-block{
  display:flex;align-items:center;gap:8px;
  border:none;border-left:2px solid var(--bdm);border-radius:0;
  margin:0 0 0 -14px;padding:4px 0 4px 10px;background:none;
  flex-wrap:nowrap}
body.view-mode .transit-top{gap:0}
body.view-mode .mode-pill:not(.selected){display:none}
body.view-mode .mode-pill.selected{border:none;background:none;padding:0;color:var(--muted);font-size:.8rem}
body.view-mode .transit-bottom{border:none;margin:0;padding:0;gap:4px;flex-wrap:nowrap}
body.view-mode .t-field{background:none;border:none;padding:0}
body.view-mode .t-flbl{display:none}
body.view-mode .t-field input{font-size:.78rem;pointer-events:none}
body.view-mode .t-field+.t-field::before{content:'·';color:var(--dim);font-size:.8rem;flex-shrink:0}

/* overnight in view mode */
body.view-mode .dc-inner{padding:10px 14px;background:rgba(139,92,246,.05)}
body.view-mode .dc-inner::after{display:none}
body.view-mode .dc-head{margin-bottom:8px}
body.view-mode .dc-del{display:none}

body.view-mode .dc-field{background:none;border:none;padding:0}
body.view-mode .dc-flbl{display:none}
body.view-mode .dc-field input{font-size:.78rem;pointer-events:none}
body.view-mode .dc-field+.dc-field::before{content:'·';color:var(--dim);font-size:.8rem;flex-shrink:0}

/* ══════════════════════════════════════════
   PDF OUTPUT (always rendered at 390px mobile)
══════════════════════════════════════════ */
#pdf-stage{
  display:none;
  position:fixed;left:-9999px;top:0;
  width:390px;
  font-family:'DM Sans',sans-serif;
  background:#07070f;color:#e8edf5;
  padding:24px 20px 32px;
  font-size:14px;line-height:1.6
}

/* PDF internal styles — mobile view layout */
#pdf-stage .p-cover{width:100%;height:160px;border-radius:12px;overflow:hidden;margin-bottom:18px;
  background:linear-gradient(135deg,#0d0d1a,#12122a)}
#pdf-stage .p-cover img{width:100%;height:100%;object-fit:cover;display:block;opacity:.85}
#pdf-stage .p-title{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;
  letter-spacing:-.03em;line-height:1.15;margin-bottom:4px}
#pdf-stage .p-sub{font-size:.85rem;color:#6a7a96;margin-bottom:32px}

#pdf-stage .p-day{margin-bottom:28px}
#pdf-stage .p-day-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:10px;
  border-bottom:1px solid rgba(0,200,168,.3)}
#pdf-stage .p-day-badge{background:rgba(0,200,168,.12);border:1px solid #00c8a8;
  border-radius:7px;padding:3px 9px;display:flex;align-items:center;gap:4px}
#pdf-stage .p-day-badge-lbl{font-family:'Syne',sans-serif;font-size:.6rem;font-weight:700;
  color:#00c8a8;letter-spacing:.1em;text-transform:uppercase}
#pdf-stage .p-day-badge-num{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:800;color:#00c8a8}
#pdf-stage .p-day-name{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:#e8edf5;flex:1}
#pdf-stage .p-day-date{font-size:.76rem;color:#6a7a96}
#pdf-stage .p-day-dow{font-size:.7rem;font-weight:600;color:#00c8a8;
  background:rgba(0,200,168,.12);border:1px solid rgba(0,200,168,.25);
  padding:2px 7px;border-radius:100px}

#pdf-stage .p-stops{padding-left:16px;border-left:2px solid rgba(0,200,168,.25)}
#pdf-stage .p-stop{padding:10px 0;border-bottom:1px solid #181828;position:relative}
#pdf-stage .p-stop:last-child{border-bottom:none}
#pdf-stage .p-stop-dot{position:absolute;left:-21px;top:16px;
  width:9px;height:9px;background:#00c8a8;border:2px solid #07070f;
  border-radius:50%;box-shadow:0 0 6px rgba(0,200,168,.4)}
#pdf-stage .p-stop-r1{display:flex;align-items:center;gap:8px;margin-bottom:3px}
#pdf-stage .p-stop-time{font-size:.9rem;font-weight:700;color:#00c8a8;flex-shrink:0}
#pdf-stage .p-stop-cat{font-size:.85rem;flex-shrink:0}
#pdf-stage .p-stop-loc{font-size:.9rem;font-weight:600;color:#e8edf5;flex:1;min-width:0}
#pdf-stage .p-stop-cost{font-size:.8rem;font-weight:600;color:#e8edf5;
  background:rgba(0,200,168,.06);border:1px solid #222238;
  padding:2px 8px;border-radius:6px;flex-shrink:0;white-space:nowrap}
#pdf-stage .p-stop-r2{display:flex;align-items:center;gap:6px;margin-bottom:4px;padding-left:2px}
#pdf-stage .p-maps{font-size:.74rem;color:#00c8a8;opacity:.8;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
#pdf-stage .p-note{font-size:.78rem;color:#6a7a96;padding-left:2px;margin-bottom:4px;white-space:pre-wrap}
#pdf-stage .p-todos{padding-left:2px}
#pdf-stage .p-todo{display:flex;align-items:flex-start;gap:5px;font-size:.76rem;color:#6a7a96;margin-bottom:2px}
#pdf-stage .p-todo-box{width:10px;height:10px;border:1px solid #3a4560;border-radius:2px;
  flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
#pdf-stage .p-todo-box.chk{background:#00c8a8;border-color:#00c8a8}
#pdf-stage .p-todo-chk{color:#000;font-size:7px}
#pdf-stage .p-todo.done span{text-decoration:line-through;opacity:.5}

#pdf-stage .p-transit{display:flex;align-items:center;gap:6px;
  margin:4px 0;padding-left:2px;font-size:.76rem;color:#6a7a96}
#pdf-stage .p-transit-icon{flex-shrink:0}
#pdf-stage .p-transit-sep{color:#3a4560}

#pdf-stage .p-dc{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.25);
  border-radius:10px;padding:12px 14px;margin:0 0 20px;position:relative}
#pdf-stage .p-dc::before{content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:#8b5cf6;border-radius:0 2px 2px 0;opacity:.7}
#pdf-stage .p-dc-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
#pdf-stage .p-dc-moon{width:24px;height:24px;border-radius:50%;flex-shrink:0;
  background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.35);
  display:flex;align-items:center;justify-content:center;font-size:.8rem}
#pdf-stage .p-dc-lbl{font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;
  color:#a78bfa;letter-spacing:.08em;text-transform:uppercase}
#pdf-stage .p-dc-row{display:flex;align-items:center;gap:6px;font-size:.76rem;color:#c4b5fd;padding-left:2px}
#pdf-stage .p-dc-sep{color:#3a4560}
</style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
  <div class="save-status">
    <div class="save-dot" id="save-dot"></div>
    <span id="save-text" style="font-size:.76rem;color:var(--muted)">Saved</span>
  </div>
  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mt-btn active" id="mt-edit" onclick="setMode('edit')">✎ Edit</button>
    <button class="mt-btn" id="mt-view" onclick="setMode('view')">👁 View</button>
  </div>
  <button onclick="clearSave()" class="btn-reset edit-only">↺</button>
</div>

<!-- Action bar -->
<div class="action-bar">
  <div class="stat">
    <span class="stat-lbl">Spend</span>
    <span class="stat-val">₹<span id="total-cost">0</span></span>
  </div>
  <div class="ab-div"></div>
  <div class="stat">
    <span class="stat-lbl">Stops</span>
    <span class="stat-val" id="total-stops">0</span>
  </div>
  <div class="ab-div"></div>
  <button onclick="addDay()" class="btn-secondary edit-only">+ Day</button>
  <button onclick="downloadPDF()" class="btn-primary">⬇ PDF</button>
</div>

<!-- Main itinerary -->
<div id="itinerary-container">
  <div class="doc-header">
    <div class="cover-wrap">
      <img id="main-cover" alt="Cover">
      <label class="cover-lbl edit-only">
        📷 Cover
        <input type="file" accept="image/*" onchange="processImage(event,'main-cover',true)">
      </label>
    </div>
    <input type="text" id="trip-title" class="title-input" value="My Trip" spellcheck="false">
    <input type="text" id="trip-subtitle" class="subtitle-input" placeholder="Dates · Destinations · Tagline…">
  </div>
  <div id="days-wrapper"></div>
</div>

<!-- Hidden PDF render stage -->
<div id="pdf-stage"></div>

<script>
let dayCount = 0, saveTimer, currentMode = 'edit';

/* ── Mode ── */
function setMode(m) {
  currentMode = m;
  document.body.classList.toggle('view-mode', m === 'view');
  document.getElementById('mt-edit').classList.toggle('active', m === 'edit');
  document.getElementById('mt-view').classList.toggle('active', m === 'view');
  /* restore expand sections to show in view mode if they were opened */
}

/* ── Day-of-week badge ── */
function updateDow(input) {
  const wrap = input.closest('.day-header');
  if (!wrap) return;
  const badge = wrap.querySelector('.dow-badge');
  if (!badge) return;
  if (!input.value) { badge.textContent = ''; badge.style.display = 'none'; return; }
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  /* parse yyyy-mm-dd safely */
  const [y, mo, d] = input.value.split('-').map(Number);
  const dt = new Date(y, mo - 1, d);
  badge.textContent = days[dt.getDay()];
  badge.style.display = 'inline-flex';
  autoSave();
}

/* ── Expand toggles ── */
function toggleDiv(id, btn) {
  const el = document.getElementById(id);
  const on = el.style.display === 'block';
  el.style.display = on ? 'none' : 'block';
  if (btn) btn.classList.toggle('active', !on);
  autoSave();
}

function handleTodo(e, cid) {
  if (e.key !== 'Enter' || !e.target.value.trim()) return;
  const id = 'td-' + Date.now();
  document.getElementById(cid).insertAdjacentHTML('beforeend', `
    <div class="todo-item" id="${id}">
      <input type="checkbox" onchange="autoSave()">
      <span contenteditable="true" onblur="autoSave()">${e.target.value.trim()}</span>
      <button class="del-stop edit-only" style="font-size:.85rem" onclick="document.getElementById('${id}').remove();autoSave()">✕</button>
    </div>`);
  e.target.value = '';
  autoSave();
}

/* ── Image processing ── */
function processImage(e, targetId, isCover = false) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = isCover ? 1200 : 400, maxH = isCover ? 600 : 400;
      let w = img.width, h = img.height;
      if (w > h) { if (w > maxW) { h = Math.round(h*maxW/w); w = maxW; } }
      else        { if (h > maxH) { w = Math.round(w*maxH/h); h = maxH; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const b64 = canvas.toDataURL('image/jpeg', .78);
      if (isCover) {
        const t = document.getElementById(targetId);
        t.src = b64; t.style.display = 'block';
      } else {
        const wid = 'img-' + Date.now();
        document.getElementById(targetId).insertAdjacentHTML('beforeend', `
          <div class="gal-img" id="${wid}">
            <img src="${b64}" alt="">
            <button class="gal-rm edit-only" onclick="document.getElementById('${wid}').remove();autoSave()">✕</button>
          </div>`);
      }
      autoSave();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

/* ── Transit pill selection ── */
function selectMode(btn) {
  btn.closest('.transit-block').querySelectorAll('.mode-pill').forEach(p => p.classList.remove('selected'));
  btn.classList.add('selected');
  autoSave();
}
function selectDcMode(btn) {
  btn.closest('.dc-inner').querySelectorAll('.dc-pill').forEach(p => p.classList.remove('selected'));
  btn.classList.add('selected');
  autoSave();
}

/* ── Overnight connector HTML ── */
function dayConnectorHTML(dcId) {
  return `
  <div class="day-connector" id="dc-${dcId}">
    <div class="dc-inner">
      <button class="dc-del edit-only" onclick="document.getElementById('dc-${dcId}').remove();autoSave()">✕</button>
      <div class="dc-head">
        <div class="dc-moon">🌙</div>
        <div><div class="dc-title">Overnight Journey</div><div class="dc-sub">Travel between days</div></div>
      </div>
      <div class="dc-row">
        <button class="dc-pill selected" onclick="selectDcMode(this)">🚆 Train</button>
        <button class="dc-pill" onclick="selectDcMode(this)">🚌 Bus</button>
        <button class="dc-pill" onclick="selectDcMode(this)">✈️ Flight</button>
        <button class="dc-pill" onclick="selectDcMode(this)">🚗 Car</button>
        <button class="dc-pill" onclick="selectDcMode(this)">🚢 Ferry</button>
        <div class="dc-field"><span class="dc-flbl">Dist</span><input type="text" placeholder="e.g. 450 km"></div>
        <div class="dc-field"><span class="dc-flbl">Time</span><input type="text" placeholder="e.g. 9h"></div>
      </div>
    </div>
  </div>`;
}

/* ── Add Day ── */
function addDay() {
  const wrapper = document.getElementById('days-wrapper');
  const dayId = 'day-' + Date.now();
  if (wrapper.children.length > 0) wrapper.insertAdjacentHTML('beforeend', dayConnectorHTML(dayId));
  wrapper.insertAdjacentHTML('beforeend', `
    <div class="day-container" id="${dayId}">
      <div class="day-header">
        <div class="day-badge">
          <span class="day-badge-lbl">Day</span>
          <input type="text" class="day-badge-num" value="${dayCount}" placeholder="0" maxlength="3" spellcheck="false">
        </div>
        <input type="text" class="day-title" value="Day ${dayCount}" spellcheck="false">
        <div class="day-date-wrap">
          <input type="date" class="day-date" onchange="updateDow(this)">
          <span class="dow-badge"></span>
        </div>
        <button class="delete-day-btn edit-only" onclick="removeDay('${dayId}')">Remove</button>
      </div>
      <div class="stops-wrap" id="sw-${dayId}"></div>
      <div class="add-controls edit-only">
        <button class="btn-add-stop" onclick="addStop('${dayId}')">+ Add Stop</button>
      </div>
    </div>`);
  new Sortable(document.getElementById('sw-'+dayId), {animation:180,handle:'.drag-handle',onEnd:autoSave});
  addStop(dayId);
  dayCount++;
  autoSave();
}

function removeDay(dayId) {
  const day = document.getElementById(dayId); if (!day) return;
  const prev = day.previousElementSibling, next = day.nextElementSibling;
  if (prev && prev.classList.contains('day-connector')) prev.remove();
  else if (next && next.classList.contains('day-connector')) next.remove();
  day.remove();
  autoSave();
}

/* ── Add Stop ── */
function addStop(dayId) {
  const container = document.getElementById('sw-'+dayId);
  const stopId = 's-' + Date.now();
  if (container.children.length > 0) {
    container.insertAdjacentHTML('beforeend', `
      <div class="transit-block" id="tr-${stopId}">
        <div class="transit-top">
          <button class="mode-pill selected" onclick="selectMode(this)">🚗 Car</button>
          <button class="mode-pill" onclick="selectMode(this)">🏍 Bike</button>
          <button class="mode-pill" onclick="selectMode(this)">🚆 Train</button>
          <button class="mode-pill" onclick="selectMode(this)">🚌 Bus</button>
          <button class="mode-pill" onclick="selectMode(this)">🚶 Walk</button>
        </div>
        <div class="transit-bottom">
          <div class="t-field"><span class="t-flbl">Dist</span><input type="text" placeholder="5 km"></div>
          <div class="t-field"><span class="t-flbl">Time</span><input type="text" placeholder="20 min"></div>
        </div>
      </div>`);
  }
  container.insertAdjacentHTML('beforeend', `
    <div class="stop-card" id="${stopId}">
      <div class="drag-handle edit-only">⠿</div>
      <div class="stop-content">
        <div class="stop-row-1">
          <input type="time" class="time-input">
          <input type="text" class="loc-input" placeholder="Location or Activity…" spellcheck="false">
          <div class="cost-wrap"><span>₹</span><input type="number" class="cost-val" placeholder="0" min="0" oninput="updateTotals()"></div>
          <button class="del-stop edit-only" onclick="deleteStop('${stopId}')">✕</button>
        </div>
        <div class="stop-row-2">
          <select class="cat-select">
            <option>📍 Explore</option><option>🍽️ Dining</option><option>🏨 Stay</option>
            <option>✈️ Transit</option><option>🎭 Event</option><option>🛍️ Shopping</option>
          </select>
          <input type="text" class="maps-input" placeholder="Maps link or note…">
        </div>
        <div class="stop-toolbar edit-only">
          <button class="tool-btn" id="nb-${stopId}" onclick="toggleDiv('n-${stopId}',this)">📝 Note</button>
          <button class="tool-btn" id="tb-${stopId}" onclick="toggleDiv('t-${stopId}',this)">☑ List</button>
          <label class="tool-btn" style="cursor:pointer">🖼 Photo
            <input type="file" accept="image/*" onchange="processImage(event,'g-${stopId}')">
          </label>
        </div>
        <div id="n-${stopId}" class="expand-sec">
          <textarea class="notes-area" placeholder="Booking refs, tips, details…"></textarea>
        </div>
        <div id="t-${stopId}" class="expand-sec">
          <div id="tl-${stopId}"></div>
          <input type="text" class="todo-input edit-only" placeholder="Add item, press Enter…" onkeypress="handleTodo(event,'tl-${stopId}')">
        </div>
        <div id="g-${stopId}" class="gallery"></div>
      </div>
    </div>`);
  autoSave();
}

function deleteStop(stopId) {
  const card = document.getElementById(stopId); if (!card) return;
  const prev = card.previousElementSibling;
  if (prev && prev.classList.contains('transit-block')) prev.remove();
  card.remove();
  autoSave();
}

function updateTotals() {
  let t = 0;
  document.querySelectorAll('.cost-val').forEach(i => t += parseFloat(i.value)||0);
  document.getElementById('total-cost').textContent = t.toLocaleString('en-IN');
  document.getElementById('total-stops').textContent = document.querySelectorAll('.stop-card').length;
}

/* ── Auto-save ── */
function autoSave() {
  const dot = document.getElementById('save-dot'), txt = document.getElementById('save-text');
  dot.classList.add('saving'); txt.textContent = 'Saving…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    document.querySelectorAll('input:not([type="file"]):not([type="checkbox"])').forEach(el => el.setAttribute('value', el.value));
    document.querySelectorAll('textarea').forEach(el => el.innerHTML = el.value);
    document.querySelectorAll('input[type="checkbox"]').forEach(el =>
      el.checked ? el.setAttribute('checked','') : el.removeAttribute('checked'));
    document.querySelectorAll('select').forEach(el =>
      Array.from(el.options).forEach(o =>
        o.value === el.value ? o.setAttribute('selected','') : o.removeAttribute('selected')));
    document.querySelectorAll('.mode-pill,.dc-pill').forEach(p =>
      p.classList.contains('selected') ? p.setAttribute('data-sel','1') : p.removeAttribute('data-sel'));
    document.querySelectorAll('.tool-btn.active').forEach(b => b.setAttribute('data-active','1'));
    document.querySelectorAll('.expand-sec').forEach(s =>
      s.style.display==='block' ? s.setAttribute('data-open','1') : s.removeAttribute('data-open'));
    document.querySelectorAll('.dow-badge').forEach(b =>
      b.textContent ? b.setAttribute('data-dow', b.textContent) : b.removeAttribute('data-dow'));

    const data = {
      html:  document.getElementById('days-wrapper').innerHTML,
      title: document.getElementById('trip-title').value,
      sub:   document.getElementById('trip-subtitle').value,
      cover: document.getElementById('main-cover').src,
      count: dayCount, mode: currentMode
    };
    try {
      localStorage.setItem('itin_v4', JSON.stringify(data));
      dot.classList.remove('saving'); txt.textContent = 'Saved';
    } catch(e) {
      dot.classList.remove('saving');
      dot.style.cssText = 'background:var(--red);box-shadow:0 0 6px var(--red)';
      txt.textContent = 'Full';
    }
    updateTotals();
  }, 700);
}
document.addEventListener('input', autoSave);
document.addEventListener('change', e => { if (!e.target.classList.contains('day-date')) autoSave(); });

/* ── Load ── */
function loadData() {
  const saved = localStorage.getItem('itin_v4');
  if (saved) {
    try {
      const d = JSON.parse(saved);
      document.getElementById('days-wrapper').innerHTML = d.html || '';
      document.getElementById('trip-title').value   = d.title || '';
      document.getElementById('trip-subtitle').value = d.sub   || '';
      dayCount = d.count ?? 0;
      if (d.cover && d.cover.startsWith('data:')) {
        const img = document.getElementById('main-cover');
        img.src = d.cover; img.style.display = 'block';
      }
      /* restore dow badges */
      document.querySelectorAll('.dow-badge[data-dow]').forEach(b => {
        b.textContent = b.getAttribute('data-dow'); b.style.display = 'inline-flex';
      });
      document.querySelectorAll('.stops-wrap').forEach(sw =>
        new Sortable(sw, {animation:180,handle:'.drag-handle',onEnd:autoSave}));
      if (d.mode) setMode(d.mode);
      updateTotals();
    } catch(e) { addDay(); }
  } else { addDay(); }
}

function clearSave() {
  if (confirm('Reset everything?')) {
    localStorage.removeItem('itin_v4'); location.reload();
  }
}

/* ══════════════════════════════════════════
   PDF — build a clean HTML representation
   then render it at 390px mobile width
══════════════════════════════════════════ */
function buildPDFHTML() {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = '';

  /* Cover */
  const coverSrc = document.getElementById('main-cover').src;
  const title    = document.getElementById('trip-title').value;
  const sub      = document.getElementById('trip-subtitle').value;
  html += `<div class="p-cover">`;
  if (coverSrc && coverSrc.startsWith('data:')) html += `<img src="${coverSrc}">`;
  html += `</div>`;
  html += `<div class="p-title">${title || 'Itinerary'}</div>`;
  if (sub) html += `<div class="p-sub">${sub}</div>`;

  /* Days */
  document.querySelectorAll('#days-wrapper > .day-container, #days-wrapper > .day-connector').forEach(el => {
    if (el.classList.contains('day-connector')) {
      /* overnight */
      const selPill = el.querySelector('.dc-pill.selected');
      const mode    = selPill ? selPill.textContent.trim() : '';
      const inputs  = el.querySelectorAll('.dc-field input');
      const dist    = inputs[0]?.value || '';
      const time    = inputs[1]?.value || '';
      html += `<div class="p-dc">
        <div class="p-dc-head"><div class="p-dc-moon">🌙</div><div class="p-dc-lbl">Overnight Journey</div></div>
        <div class="p-dc-row">`;
      if (mode) html += `<span>${mode}</span>`;
      if (dist) html += `<span class="p-dc-sep">·</span><span>${dist}</span>`;
      if (time) html += `<span class="p-dc-sep">·</span><span>${time}</span>`;
      html += `</div></div>`;
    } else {
      /* day */
      const badgeNum = el.querySelector('.day-badge-num')?.value || '';
      const dayName  = el.querySelector('.day-title')?.value || '';
      const dateVal  = el.querySelector('.day-date')?.value || '';
      let dateStr = '', dowStr = '';
      if (dateVal) {
        const [y,mo,d] = dateVal.split('-').map(Number);
        const dt = new Date(y, mo-1, d);
        dowStr  = days[dt.getDay()];
        dateStr = dt.toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
      }

      html += `<div class="p-day">
        <div class="p-day-hd">
          <div class="p-day-badge"><span class="p-day-badge-lbl">Day</span><span class="p-day-badge-num">${badgeNum}</span></div>
          <span class="p-day-name">${dayName}</span>`;
      if (dateStr) html += `<span class="p-day-date">${dateStr}</span>`;
      if (dowStr)  html += `<span class="p-day-dow">${dowStr}</span>`;
      html += `</div><div class="p-stops">`;

      el.querySelectorAll('.stop-card, .transit-block').forEach(item => {
        if (item.classList.contains('transit-block')) {
          const selPill = item.querySelector('.mode-pill.selected');
          const mode    = selPill ? selPill.textContent.trim() : '';
          const tInputs = item.querySelectorAll('.t-field input');
          const dist    = tInputs[0]?.value || '';
          const time    = tInputs[1]?.value || '';
          html += `<div class="p-transit"><span class="p-transit-icon">${mode}</span>`;
          if (dist) html += `<span class="p-transit-sep">·</span><span>${dist}</span>`;
          if (time) html += `<span class="p-transit-sep">·</span><span>${time}</span>`;
          html += `</div>`;
        } else {
          /* stop card */
          const time  = item.querySelector('.time-input')?.value || '';
          const loc   = item.querySelector('.loc-input')?.value  || '';
          const cat   = item.querySelector('.cat-select');
          const catTxt = cat ? cat.options[cat.selectedIndex]?.text || '' : '';
          const catEmoji = catTxt.split(' ')[0] || '';
          const cost  = item.querySelector('.cost-val')?.value;
          const maps  = item.querySelector('.maps-input')?.value || '';
          const noteEl = item.querySelector('.notes-area');
          const note  = noteEl?.value || '';
          /* format time 24→12h */
          let timeFmt = time;
          if (time) {
            const [hh,mm] = time.split(':').map(Number);
            const ampm = hh >= 12 ? 'PM' : 'AM';
            timeFmt = `${hh%12||12}:${String(mm).padStart(2,'0')} ${ampm}`;
          }

          html += `<div class="p-stop"><div class="p-stop-dot"></div>
            <div class="p-stop-r1">`;
          if (timeFmt) html += `<span class="p-stop-time">${timeFmt}</span>`;
          if (catEmoji) html += `<span class="p-stop-cat">${catEmoji}</span>`;
          html += `<span class="p-stop-loc">${loc || '—'}</span>`;
          if (cost) html += `<span class="p-stop-cost">₹${Number(cost).toLocaleString('en-IN')}</span>`;
          html += `</div>`;
          if (maps) html += `<div class="p-stop-r2"><span class="p-maps">${maps}</span></div>`;
          if (note) html += `<div class="p-note">${note}</div>`;

          /* todos */
          const todos = item.querySelectorAll('.todo-item');
          if (todos.length) {
            html += `<div class="p-todos">`;
            todos.forEach(td => {
              const checked = td.querySelector('input[type="checkbox"]')?.checked;
              const txt     = td.querySelector('span')?.textContent || '';
              html += `<div class="p-todo ${checked?'done':''}">
                <div class="p-todo-box ${checked?'chk':''}">
                  ${checked ? '<span class="p-todo-chk">✓</span>' : ''}
                </div>
                <span>${txt}</span></div>`;
            });
            html += `</div>`;
          }
          html += `</div>`;
        }
      });
      html += `</div></div>`; /* /p-stops /p-day */
    }
  });
  return html;
}

function downloadPDF() {
  const stage = document.getElementById('pdf-stage');
  stage.innerHTML = buildPDFHTML();
  stage.style.display = 'block';

  const filename = (document.getElementById('trip-title').value.trim() || 'Itinerary') + '.pdf';

  html2pdf().set({
    margin:      [14, 12, 14, 12],
    filename:    filename,
    image:       { type: 'jpeg', quality: .97 },
    html2canvas: {
      scale:           2.5,
      useCORS:         true,
      backgroundColor: '#07070f',
      windowWidth:     390,
      scrollX:         0,
      scrollY:         -window.scrollY,
      logging:         false,
    },
    jsPDF:     { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all','css'], before: '.p-day' }
  }).from(stage).save().then(() => {
    stage.style.display = 'none';
    stage.innerHTML = '';
  });
}

window.addEventListener('load', loadData);
</script>
</body>
</html>
