<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itinerary Planner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--surf:#0d0d1a;--surf2:#121220;
  --txt:#e8edf5;--muted:#6a7a96;--dim:#3a4560;
  --ac:#00c8a8;--acs:rgba(0,200,168,.12);--acg:rgba(0,200,168,.3);
  --bd:#181828;--bdm:#222238;--bdh:#2e2e50;
  --red:#f06c6c;--reds:rgba(240,108,108,.1);
  --ok:#2dd4b0;--warn:#f59e0b;
  --nt:#8b5cf6;--nts:rgba(139,92,246,.12);
  --r:14px;--rs:8px;
  --s1:0 4px 16px rgba(0,0,0,.4);--s2:0 12px 40px rgba(0,0,0,.7);
  /* category accent colors */
  --cat-explore:#00c8a8;--cat-dining:#f59e0b;--cat-stay:#8b5cf6;
  --cat-transit:#3b82f6;--cat-event:#ec4899;--cat-shopping:#f97316
}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans', sans-serif;background:var(--bg);color:var(--txt);
  line-height:1.6;padding:20px 16px 130px;max-width:768px;margin:0 auto;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E")}

/* ── scroll progress bar ── */
.scroll-bar{position:fixed;top:0;left:0;height:2px;width:0%;
  background:linear-gradient(90deg,var(--ac),#00e0c0);
  z-index:9999;transition:width .08s linear;
  box-shadow:0 0 10px var(--acg)}

/* ── base inputs ── */
input,select,textarea{font-family:'Plus Jakarta Sans', sans-serif;color:inherit;
  background:transparent;border:none;border-bottom:1px dashed transparent;
  padding:3px 0;transition:border-color .2s,color .2s}
input:hover:not([type="checkbox"]):not([type="file"]),
select:hover,textarea:hover{border-bottom-color:var(--bdh)}
input:focus,select:focus,textarea:focus{outline:none;border-bottom:1px solid var(--ac)}
input::placeholder,textarea::placeholder{color:var(--dim)}
input[type="file"]{display:none!important}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

/* ── top bar ── */
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;position:relative;z-index:2}
.save-status{display:flex;align-items:center;gap:6px;background:var(--surf);
  border:1px solid var(--bdm);padding:5px 12px;border-radius:100px;margin-right:auto}
.save-dot{width:7px;height:7px;background:var(--ok);border-radius:50%;
  box-shadow:0 0 6px var(--ok);transition:background .3s,box-shadow .3s}
.save-dot.saving{background:var(--warn);box-shadow:0 0 6px var(--warn);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-reset{color:var(--muted);background:var(--surf);border:1px solid var(--bdm);
  cursor:pointer;font-size:.78rem;font-weight:500;padding:5px 12px;border-radius:100px;
  font-family:inherit;transition:.2s;white-space:nowrap}
.btn-reset:hover{color:var(--red);border-color:var(--red);background:var(--reds)}

/* ── Mode toggle ── */
.mode-toggle{display:flex;align-items:center;background:var(--surf2);
  border:1px solid var(--bdm);border-radius:100px;padding:3px;gap:2px}
.mt-btn{background:none;border:none;cursor:pointer;font-family:'Plus Jakarta Sans', sans-serif;
  font-size:.78rem;font-weight:600;color:var(--muted);padding:5px 14px;
  border-radius:100px;transition:.2s;white-space:nowrap}
.mt-btn.active{background:var(--ac);color:#000}
.mt-btn:not(.active):hover{color:var(--txt)}

/* ── action bar ── */
.action-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(13,13,26,.94);backdrop-filter:blur(20px) saturate(180%);
  padding:10px 16px;border-radius:100px;display:flex;gap:12px;align-items:center;
  box-shadow:var(--s2),0 0 0 1px rgba(255,255,255,.05);border:1px solid var(--bdm);z-index:1000;
  max-width:calc(100% - 32px)}
.ab-div{width:1px;height:26px;background:var(--bdm);flex-shrink:0}
.stat{display:flex;flex-direction:column;cursor:default}
.stat-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600}
.stat-val{font-size:.9rem;font-weight:700;color:var(--ac);font-family:'Outfit', sans-serif}
.btn-primary{background:var(--ac);color:#000;border:none;padding:8px 16px;border-radius:100px;
  font-weight:700;cursor:pointer;transition:.25s;font-size:.82rem;font-family:'Plus Jakarta Sans', sans-serif;white-space:nowrap}
.btn-primary:hover{background:#00e0c0;box-shadow:0 0 20px var(--acg);transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--txt);border:1px solid var(--bdh);padding:8px 12px;
  border-radius:100px;font-weight:500;cursor:pointer;transition:.2s;font-size:.82rem;
  font-family:'Plus Jakarta Sans', sans-serif;white-space:nowrap}
.btn-secondary:hover{background:var(--surf2);border-color:var(--muted)}
.btn-icon{background:transparent;color:var(--muted);border:1px solid var(--bdh);
  padding:8px 10px;border-radius:100px;font-weight:500;cursor:pointer;transition:.2s;
  font-size:.82rem;font-family:'Plus Jakarta Sans', sans-serif;white-space:nowrap}
.btn-icon:hover{background:var(--surf2);border-color:var(--muted);color:var(--txt)}

/* ── doc header ── */
.doc-header{margin-bottom:32px;position:relative;z-index:1}
.cover-wrap{width:100%;height:200px;border-radius:var(--r);overflow:hidden;
  margin-bottom:20px;position:relative;border:1px solid var(--bdm);
  background:linear-gradient(135deg,#0d0d1a 0%,#12122a 50%,#0a1020 100%)}
.cover-wrap::before{content:'';position:absolute;inset:0;opacity:.4;
  background-image:linear-gradient(var(--bd) 1px,transparent 1px),
    linear-gradient(90deg,var(--bd) 1px,transparent 1px);background-size:40px 40px}
.cover-wrap::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 60%,var(--acs) 0%,transparent 60%)}
.cover-wrap img{width:100%;height:100%;object-fit:cover;display:none;opacity:.85;position:relative;z-index:2}
.cover-lbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(7,7,15,.7);padding:8px 18px;border-radius:100px;font-size:.78rem;
  font-weight:600;cursor:pointer;border:1px solid var(--ac);color:var(--ac);
  backdrop-filter:blur(8px);transition:.2s;z-index:3;white-space:nowrap}
.cover-lbl:hover{background:var(--ac);color:#000}
.title-input{font-family:'Outfit', sans-serif;font-size:2rem;font-weight:800;
  width:100%;color:var(--txt);letter-spacing:-.03em;line-height:1.15}
.subtitle-input{font-size:.9rem;width:100%;color:var(--muted);margin-top:6px}

/* ── trip stats strip ── */
.trip-stats{display:flex;align-items:stretch;background:var(--surf);
  border:1px solid var(--bdm);border-radius:var(--r);
  margin:16px 0 28px;overflow:hidden}
.ts-item{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;padding:12px 8px;gap:2px}
.ts-val{font-family:'Outfit', sans-serif;font-size:1.15rem;font-weight:800;color:var(--ac)}
.ts-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:600}
.ts-div{width:1px;background:var(--bdm);flex-shrink:0;margin:10px 0}

/* ── day container ── */
.day-container{margin-bottom:36px;position:relative;z-index:1;animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.day-header{display:flex;align-items:center;gap:10px;margin-bottom:22px;position:relative;flex-wrap:wrap}
.day-header::after{content:'';position:absolute;bottom:-10px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--ac) 0%,var(--bdm) 40%,transparent 100%);opacity:.5}
.day-badge{display:flex;align-items:center;gap:4px;flex-shrink:0;
  background:var(--acs);border:1px solid var(--ac);border-radius:var(--rs);padding:3px 10px}
.day-badge-lbl{font-family:'Outfit', sans-serif;font-size:.62rem;font-weight:700;
  color:var(--ac);letter-spacing:.12em;text-transform:uppercase}
.day-badge-num{font-family:'Outfit', sans-serif;font-size:.72rem;font-weight:800;
  color:var(--ac);width:26px;text-align:center;padding:0!important;
  border-bottom:1px dashed rgba(0,200,168,.35)!important}
.day-badge-num:focus{border-bottom-color:var(--ac)!important}
.day-title{font-family:'Outfit', sans-serif;font-size:1.2rem;font-weight:700;
  width:auto;min-width:60px;color:var(--txt)}
.day-date-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
.day-date{font-size:.8rem;color:var(--muted);width:130px}
.dow-badge{font-size:.72rem;font-weight:600;color:var(--ac);
  background:var(--acs);border:1px solid rgba(0,200,168,.25);
  padding:2px 8px;border-radius:100px;white-space:nowrap;display:none}
.delete-day-btn{color:var(--dim);cursor:pointer;border:1px solid transparent;background:none;
  font-size:.78rem;font-weight:500;font-family:inherit;padding:4px 10px;
  border-radius:100px;transition:.2s;flex-shrink:0}
.delete-day-btn:hover{color:var(--red);border-color:var(--red);background:var(--reds)}

/* day spend badge */
.day-spend{font-size:.7rem;font-weight:600;color:var(--muted);
  background:var(--surf2);border:1px solid var(--bdm);
  padding:2px 8px;border-radius:100px;white-space:nowrap;display:none}

/* day collapse chevron */
.day-collapse-btn{background:none;border:none;cursor:pointer;color:var(--dim);
  font-size:.9rem;padding:4px;border-radius:6px;transition:.2s;flex-shrink:0;display:none}
.day-collapse-btn:hover{color:var(--ac)}
.day-container.collapsed .day-collapse-btn{transform:rotate(-90deg)}

/* ── timeline ── */
.stops-wrap{position:relative;padding-left:24px}
.stops-wrap::before{content:'';position:absolute;left:7px;top:12px;bottom:12px;width:2px;
  background:linear-gradient(to bottom,var(--ac) 0%,var(--bdm) 60%,transparent 100%);opacity:.5}

/* ── stop card ── */
.stop-card{background:var(--surf);border:1px solid var(--bdm);border-radius:var(--r);
  padding:16px 16px 12px 28px;margin-bottom:12px;position:relative;
  box-shadow:var(--s1);transition:border-color .2s,box-shadow .2s}
.stop-card:hover{border-color:var(--bdh);box-shadow:var(--s2)}
/* category left accent */
.stop-card::after{content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:3px;border-radius:0 2px 2px 0;opacity:0;transition:opacity .2s;background:var(--ac)}
.stop-card:hover::after{opacity:.7}
.stop-card[data-cat="dining"]::after{background:var(--cat-dining)}
.stop-card[data-cat="stay"]::after{background:var(--cat-stay)}
.stop-card[data-cat="transit"]::after{background:var(--cat-transit)}
.stop-card[data-cat="event"]::after{background:var(--cat-event)}
.stop-card[data-cat="shopping"]::after{background:var(--cat-shopping)}
.stop-card::before{content:'';position:absolute;left:-22px;top:22px;
  width:10px;height:10px;background:var(--ac);border:2px solid var(--bg);
  border-radius:50%;z-index:2;box-shadow:0 0 8px var(--acg);transition:transform .2s,background .2s}
.stop-card[data-cat="dining"]::before{background:var(--cat-dining);box-shadow:0 0 8px rgba(245,158,11,.4)}
.stop-card[data-cat="stay"]::before{background:var(--cat-stay);box-shadow:0 0 8px rgba(139,92,246,.4)}
.stop-card[data-cat="transit"]::before{background:var(--cat-transit);box-shadow:0 0 8px rgba(59,130,246,.4)}
.stop-card[data-cat="event"]::before{background:var(--cat-event);box-shadow:0 0 8px rgba(236,72,153,.4)}
.stop-card[data-cat="shopping"]::before{background:var(--cat-shopping);box-shadow:0 0 8px rgba(249,115,22,.4)}
.stop-card:hover::before{transform:scale(1.2)}
.drag-handle{position:absolute;left:8px;top:18px;color:var(--dim);cursor:grab;
  font-size:1rem;user-select:none}
.drag-handle:active{cursor:grabbing}

.stop-row-1{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:nowrap}
.time-input{font-size:.95rem;font-weight:600;color:var(--ac);width:80px;flex-shrink:0}
.time-input::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer}
.loc-input{font-size:.95rem;font-weight:600;flex-grow:1;min-width:0}
.cost-wrap{display:flex;align-items:center;background:rgba(0,200,168,.06);
  padding:4px 10px;border-radius:var(--rs);border:1px solid var(--bdm);gap:2px;
  transition:border-color .2s;flex-shrink:0}
.cost-wrap:focus-within{border-color:var(--ac)}
.cost-wrap span{color:var(--ac);font-size:.8rem;font-weight:600}
.cost-wrap input{font-size:.82rem;font-weight:600;width:52px;color:var(--txt);border:none!important}
.del-stop{color:var(--dim);cursor:pointer;border:none;background:none;
  font-size:1rem;padding:3px 5px;border-radius:6px;transition:.2s;flex-shrink:0}
.del-stop:hover{color:var(--red);background:var(--reds)}

.stop-row-2{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.cat-select{font-size:.78rem;font-weight:500;color:var(--muted);
  background:var(--surf2);padding:4px 8px;border-radius:var(--rs);
  border:1px solid var(--bdm);cursor:pointer;font-family:inherit;flex-shrink:0}
.cat-select option{background:var(--surf2)}
.maps-input{font-size:.78rem;color:var(--ac);flex-grow:1;min-width:0;overflow:hidden;text-overflow:ellipsis}

/* ── toolbar ── */
.stop-toolbar{display:flex;gap:5px;border-top:1px solid var(--bd);padding-top:10px;margin-top:4px;flex-wrap:wrap}
.tool-btn{background:none;border:1px solid transparent;color:var(--muted);font-size:.74rem;
  font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;
  padding:4px 9px;border-radius:var(--rs);transition:.2s;font-family:inherit;white-space:nowrap}
.tool-btn:hover{background:var(--surf2);color:var(--txt);border-color:var(--bdm)}
.tool-btn.active{color:var(--ac);border-color:var(--ac);background:var(--acs)}

/* ── expand sections ── */
.expand-sec{margin-top:10px;display:none;animation:slideIn .2s ease both}
@keyframes slideIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.notes-area{width:100%;min-height:56px;font-size:.84rem;color:var(--muted);
  background:rgba(255,255,255,.02);border:1px solid var(--bdm)!important;
  border-radius:var(--rs);padding:10px 12px;resize:vertical;
  font-family:'Plus Jakarta Sans', sans-serif;transition:border-color .2s}
.notes-area:focus{border-color:var(--ac)!important;color:var(--txt)}

/* ── todos ── */
.todo-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;
  border-bottom:1px solid var(--bd);font-size:.84rem}
.todo-item:last-of-type{border-bottom:none}
.todo-item input[type="checkbox"]{margin-top:3px;width:14px;height:14px;
  accent-color:var(--ac);cursor:pointer;flex-shrink:0}
.todo-item span{flex-grow:1;outline:none;color:var(--muted)}
.todo-item input[type="checkbox"]:checked+span{text-decoration:line-through;opacity:.5}
.todo-input{width:100%;font-size:.8rem;padding:7px 10px;background:var(--surf2);
  border:1px dashed var(--bdm)!important;border-radius:var(--rs);margin-top:6px}
.todo-input:focus{border-color:var(--ac)!important}

/* ── gallery ── */
.gallery{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.gal-img{position:relative;width:76px;height:76px;border-radius:10px;
  overflow:hidden;border:1px solid var(--bdm)}
.gal-img img{width:100%;height:100%;object-fit:cover;display:block}
.gal-rm{position:absolute;top:4px;right:4px;background:rgba(7,7,15,.8);color:#fff;
  border:none;border-radius:50%;width:17px;height:17px;font-size:9px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.2s}
.gal-rm:hover{background:var(--red)}

/* ── transit between stops ── */
.transit-block{margin:2px 0 10px -14px;background:var(--surf2);
  border:1px solid var(--bdm);border-radius:12px;padding:8px 12px;
  position:relative;z-index:2;transition:border-color .2s}
.transit-block:hover{border-color:var(--bdh)}
.transit-top{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.mode-pill{display:flex;align-items:center;gap:3px;padding:3px 9px;border-radius:100px;
  border:1px solid var(--bdm);background:transparent;cursor:pointer;font-size:.72rem;
  font-weight:500;color:var(--muted);font-family:'Plus Jakarta Sans', sans-serif;transition:.18s;user-select:none}
.mode-pill:hover{border-color:var(--bdh);color:var(--txt);background:var(--surf)}
.mode-pill.selected{background:var(--acs);border-color:var(--ac);color:var(--ac)}
.transit-bottom{display:flex;gap:6px;margin-top:7px;padding-top:7px;border-top:1px solid var(--bd)}
.t-field{display:flex;align-items:center;gap:5px;background:var(--surf);
  border:1px solid var(--bdm);border-radius:var(--rs);padding:3px 9px;flex:1;transition:border-color .2s}
.t-field:focus-within{border-color:var(--ac)}
.t-flbl{font-size:.66rem;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.t-field input{font-size:.78rem;color:var(--muted);flex:1;min-width:40px;border:none!important}
.t-field input::placeholder{color:var(--dim)}
.t-field input:focus{color:var(--txt)}

/* ── overnight day connector ── */
.day-connector{position:relative;z-index:1;margin:0 0 28px;animation:fadeUp .3s ease both}
.dc-inner{background:linear-gradient(135deg,rgba(139,92,246,.1) 0%,rgba(13,13,26,.98) 100%);
  border:1px solid rgba(139,92,246,.35);border-radius:var(--r);
  padding:14px 16px;position:relative;overflow:hidden}
.dc-inner::before{content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--nt);border-radius:0 2px 2px 0;opacity:.8}
.dc-inner::after{content:'✦  ✦  ✦';position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-size:.45rem;letter-spacing:6px;color:rgba(139,92,246,.2);pointer-events:none}
.dc-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.dc-moon{width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.4);
  display:flex;align-items:center;justify-content:center;font-size:.9rem}
.dc-title{font-family:'Outfit', sans-serif;font-size:.72rem;font-weight:700;
  color:#a78bfa;letter-spacing:.08em;text-transform:uppercase}
.dc-sub{font-size:.7rem;color:var(--muted);margin-top:1px}
.dc-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dc-pill{display:flex;align-items:center;gap:3px;padding:4px 10px;border-radius:100px;
  border:1px solid var(--bdm);background:transparent;cursor:pointer;font-size:.74rem;
  font-weight:500;color:var(--muted);font-family:'Plus Jakarta Sans', sans-serif;transition:.18s;user-select:none}
.dc-pill:hover{border-color:rgba(139,92,246,.5);color:#c4b5fd;background:var(--nts)}
.dc-pill.selected{background:var(--nts);border-color:var(--nt);color:#c4b5fd}
.dc-field{display:flex;align-items:center;gap:5px;background:rgba(7,7,15,.5);
  border:1px solid var(--bdm);border-radius:var(--rs);padding:4px 10px;
  min-width:90px;flex:1;transition:border-color .2s}
.dc-field:focus-within{border-color:var(--nt)}
.dc-flbl{font-size:.64rem;font-weight:600;color:rgba(139,92,246,.6);
  text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.dc-field input{font-size:.78rem;color:var(--muted);flex:1;min-width:40px;border:none!important}
.dc-field input::placeholder{color:var(--dim)}
.dc-field input:focus{color:#c4b5fd}
.dc-del{position:absolute;top:10px;right:12px;color:var(--dim);cursor:pointer;border:none;
  background:none;font-size:.76rem;font-family:inherit;padding:3px 7px;border-radius:100px;transition:.2s}
.dc-del:hover{color:var(--red);background:var(--reds)}

/* ── add stop ── */
.add-controls{display:flex;gap:8px;margin-top:16px;padding-left:24px}
.btn-add-stop{background:var(--surf);border:1px dashed var(--bdh);color:var(--muted);
  padding:11px;border-radius:var(--r);flex:1;font-weight:500;cursor:pointer;

<script>
let dayCount = 1, saveTimer, currentMode = 'view';

/* ══ Scroll progress bar ══ */
window.addEventListener('scroll', () => {
  const el = document.documentElement;
  const pct = el.scrollTop / (el.scrollHeight - el.clientHeight) * 100;
  document.getElementById('scroll-bar').style.width = pct + '%';
}, {passive:true});

/* ══ Toast ══ */
let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ══ Confetti ══ */
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ['#00c8a8','#f59e0b','#8b5cf6','#ec4899','#3b82f6','#f97316'];
  const pieces = Array.from({length:80}, () => ({
    x: Math.random() * canvas.width,
    y: -10,
    r: Math.random() * 6 + 3,
    c: colors[Math.floor(Math.random()*colors.length)],
    vx: (Math.random()-0.5)*4,
    vy: Math.random()*4+2,
    rot: Math.random()*360,
    vrot: (Math.random()-0.5)*8
  }));
  let frame;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.c; ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6);
      ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vrot; p.vy+=0.05;
    });
    if (pieces.some(p => p.y < canvas.height+20)) frame = requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  cancelAnimationFrame(frame); draw();
}

/* ══ Mode ══ */
function setMode(m) {
  currentMode = m;
  const isCompact = m === 'compact';
  const isView = m === 'view' || isCompact;
  document.body.classList.toggle('view-mode', isView);
  document.body.classList.toggle('compact-view', isCompact);
  document.getElementById('mt-edit').classList.toggle('active', m === 'edit');
  document.getElementById('mt-view').classList.toggle('active', m === 'view');
  document.getElementById('mt-compact').classList.toggle('active', m === 'compact');
}

/* ══ Category utils ══ */
const CAT_MAP = {
  '📍 Explore':'explore','🍽️ Dining':'dining','🏨 Stay':'stay',
  '✈️ Transit':'transit','🎭 Event':'event','🛍️ Shopping':'shopping'
};
function catKey(selectEl) {
  const txt = selectEl.options[selectEl.selectedIndex]?.text || '';
  return CAT_MAP[txt] || 'explore';
}
function updateStopCat(sel) {
  sel.closest('.stop-card')?.setAttribute('data-cat', catKey(sel));
  autoSave();
}

/* ══ Day-of-week badge ══ */
function updateDow(input) {
  const wrap = input.closest('.day-header'); if (!wrap) return;
  const badge = wrap.querySelector('.dow-badge'); if (!badge) return;
  if (!input.value) { badge.textContent = ''; badge.style.display = 'none'; return; }
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const [y,mo,d] = input.value.split('-').map(Number);
  badge.textContent = days[new Date(y,mo-1,d).getDay()];
  badge.style.display = 'inline-flex';
  autoSave();
}

/* ══ Day spend ══ */
function updateDaySpend() {
  document.querySelectorAll('.day-container').forEach(day => {
    let t = 0;
    day.querySelectorAll('.cost-val').forEach(i => t += parseFloat(i.value)||0);
    const badge = day.querySelector('.day-spend');

/* ══ Image processing ══ */
function processImage(e, targetId, isCover=false) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = isCover?1200:400, maxH = isCover?600:400;
      let w = img.width, h = img.height;
      if (w>h){if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}}
      else{if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const b64 = canvas.toDataURL('image/jpeg',.78);
      if (isCover) {
        const t=document.getElementById(targetId); t.src=b64; t.style.display='block';
      } else {
        const wid='img-'+Date.now();
        document.getElementById(targetId).insertAdjacentHTML('beforeend',`
          <div class="gal-img" id="${wid}">
            <img src="${b64}" alt="">
            <button class="gal-rm edit-only" onclick="document.getElementById('${wid}').remove();autoSave()">✕</button>
          </div>`);
      }
      autoSave();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

/* ══ Totals ══ */
function updateTotals() {
  let cost = 0, stops = 0, days = 0;
  document.querySelectorAll('.cost-val').forEach(i => cost += parseFloat(i.value)||0);
  stops = document.querySelectorAll('.stop-card').length;
  days = document.querySelectorAll('.day-container').length;
  document.getElementById('total-cost').textContent = cost.toLocaleString('en-IN');
  document.getElementById('total-stops').textContent = stops;
  document.getElementById('total-days').textContent = days;
  // Stats strip
  document.getElementById('stats-days').textContent = days;
  document.getElementById('stats-stops').textContent = stops;
  document.getElementById('stats-budget').textContent = '₹' + cost.toLocaleString('en-IN');
  // Duration: find earliest & latest times
  const times = [];
  document.querySelectorAll('.time-input').forEach(t => { if(t.value) times.push(t.value); });
  if (times.length >= 2) {
    times.sort();
    const [h1,m1] = times[0].split(':').map(Number);
    const [h2,m2] = times[times.length-1].split(':').map(Number);
    const diff = (h2*60+m2) - (h1*60+m1);
    if (diff > 0) {
      const hh = Math.floor(diff/60), mm = diff%60;
      document.getElementById('stats-duration').textContent = hh+'h'+(mm?mm+'m':'');
    } else { document.getElementById('stats-duration').textContent = '—'; }
  } else { document.getElementById('stats-duration').textContent = '—'; }
  updateDaySpend();
}

/* ══ Auto-save ══ */
function autoSave() {
  const dot = document.getElementById('save-dot'), txt = document.getElementById('save-text');
  dot.classList.add('saving'); txt.textContent = 'Saving…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    document.querySelectorAll('input:not([type="file"]):not([type="checkbox"])').forEach(el => el.setAttribute('value', el.value));
    document.querySelectorAll('textarea').forEach(el => el.innerHTML = el.value);
    document.querySelectorAll('input[type="checkbox"]').forEach(el =>
      el.checked ? el.setAttribute('checked','') : el.removeAttribute('checked'));
    document.querySelectorAll('select').forEach(el =>
      Array.from(el.options).forEach(o =>
        o.value===el.value ? o.setAttribute('selected','') : o.removeAttribute('selected')));
    document.querySelectorAll('.mode-pill,.dc-pill').forEach(p =>
      p.classList.contains('selected') ? p.setAttribute('data-sel','1') : p.removeAttribute('data-sel'));
    document.querySelectorAll('.tool-btn.active').forEach(b => b.setAttribute('data-active','1'));
    document.querySelectorAll('.expand-sec').forEach(s =>
      s.style.display==='block' ? s.setAttribute('data-open','1') : s.removeAttribute('data-open'));
    document.querySelectorAll('.dow-badge').forEach(b =>
      b.textContent ? b.setAttribute('data-dow', b.textContent) : b.removeAttribute('data-dow'));
    // Save collapsed state
    document.querySelectorAll('.day-container').forEach(d =>
      d.classList.contains('collapsed') ? d.setAttribute('data-collapsed','1') : d.removeAttribute('data-collapsed'));
    const data = {
      html: document.getElementById('days-wrapper').innerHTML,
      title: document.getElementById('trip-title').value,
      sub: document.getElementById('trip-subtitle').value,
      cover: document.getElementById('main-cover').src,
      count: dayCount, mode: currentMode
    };
    try {
      localStorage.setItem('itin_v5', JSON.stringify(data));
      dot.classList.remove('saving'); txt.textContent = 'Saved';
    } catch(e) {
      dot.classList.remove('saving');
      dot.style.cssText = 'background:var(--red);box-shadow:0 0 6px var(--red)';
      txt.textContent = 'Full';
    }
    updateTotals();
  }, 700);
}

/* ══ Load ══ */
function loadData() {
  // Try new key first, fall back to old key
  const raw = localStorage.getItem('itin_v5') || localStorage.getItem('itin_v4');
  if (raw) {
    try {
      const d = JSON.parse(raw);
      document.getElementById('days-wrapper').innerHTML = d.html || '';
      document.getElementById('trip-title').value = d.title || '';
      document.getElementById('trip-subtitle').value = d.sub || '';
      dayCount = d.count ?? 1;
      if (d.cover && d.cover.startsWith('data:')) {
        const img = document.getElementById('main-cover');
        img.src = d.cover; img.style.display = 'block';
      }
      document.querySelectorAll('.dow-badge[data-dow]').forEach(b => {
        b.textContent = b.getAttribute('data-dow'); b.style.display = 'inline-flex';
      });
      document.querySelectorAll('.day-container[data-collapsed]').forEach(d => d.classList.add('collapsed'));
      document.querySelectorAll('.stops-wrap').forEach(sw =>
        new Sortable(sw, {animation:180,handle:'.drag-handle',onEnd:autoSave}));
      // Restore cat data attributes
      document.querySelectorAll('.stop-card').forEach(card => {
        const sel = card.querySelector('.cat-select');
        if (sel) card.setAttribute('data-cat', catKey(sel));
      });
      if (d.mode) setMode(d.mode); else setMode('view');
      updateTotals();
    } catch(e) { addDay(); setMode('view'); }
  } else { addDay(); setMode('view'); }
}
function clearSave() {
  if (confirm('Reset everything?')) {
    localStorage.removeItem('itin_v5');
    localStorage.removeItem('itin_v4');

}

/* ══ Share / Export ══ */
function shareText() {
  const title = document.getElementById('trip-title').value || 'Itinerary';
  const sub = document.getElementById('trip-subtitle').value;
  let text = `🗺️ ${title}\n`;
  if (sub) text += `${sub}\n`;
  text += '\n';
  document.querySelectorAll('#days-wrapper > .day-container, #days-wrapper > .day-connector').forEach(el => {
    if (el.classList.contains('day-connector')) {
      const sel = el.querySelector('.dc-pill.selected'); const mode = sel?.textContent.trim()||'';
      const inputs = el.querySelectorAll('.dc-field input');
      const dist = inputs[0]?.value||'', time2 = inputs[1]?.value||'';
      text += `\n🌙 Overnight: ${[mode,dist,time2].filter(Boolean).join(' · ')}\n`;
    } else {
      const badgeNum = el.querySelector('.day-badge-num')?.value||'';
      const dayName  = el.querySelector('.day-title')?.value||'';
      const dateInp  = el.querySelector('.day-date')?.value||'';
      let dateStr = '';
      if (dateInp) {
        const [y,mo,d2] = dateInp.split('-').map(Number);
        dateStr = new Date(y,mo-1,d2).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
      }
      text += `\n📅 Day ${badgeNum} — ${dayName}${dateStr?' ('+dateStr+')':''}\n`;
      el.querySelectorAll('.stop-card, .transit-block').forEach(item => {
        if (item.classList.contains('transit-block')) {
          const m = item.querySelector('.mode-pill.selected')?.textContent.trim()||'';
          const ti = item.querySelectorAll('.t-field input');
          const d2 = ti[0]?.value||'', t2 = ti[1]?.value||'';
          text += `  → ${[m,d2,t2].filter(Boolean).join(' · ')}\n`;
        } else {
          const t = item.querySelector('.time-input')?.value||'';
          const loc = item.querySelector('.loc-input')?.value||'';
          const cat = item.querySelector('.cat-select');
          const catTxt = cat?.options[cat.selectedIndex]?.text||'';
          const cost = item.querySelector('.cost-val')?.value||'';
          let tf = t;
          if (t) { const [hh,mm]=t.split(':').map(Number); tf=`${hh%12||12}:${String(mm).padStart(2,'0')} ${hh>=12?'PM':'AM'}`; }
          text += `  ${tf||'--'} ${catTxt.split(' ')[0]||''} ${loc||'—'}${cost?' · ₹'+Number(cost).toLocaleString('en-IN'):''}\n`;
        }
      });
    }
  });
  navigator.clipboard.writeText(text).then(() => showToast('Summary copied to clipboard! 📋')).catch(() => showToast('Copy failed', 'error'));
}

function downloadCSV() {
  const rows = [['Day','Date','Time','Location','Category','Cost (₹)','Maps','Notes']];
  document.querySelectorAll('#days-wrapper > .day-container').forEach(el => {
    const badgeNum = el.querySelector('.day-badge-num')?.value||'';
    const dayName  = el.querySelector('.day-title')?.value||'';
    const dateInp  = el.querySelector('.day-date')?.value||'';
    el.querySelectorAll('.stop-card').forEach(item => {
      const t = item.querySelector('.time-input')?.value||'';
      const loc = item.querySelector('.loc-input')?.value||'';
      const cat = item.querySelector('.cat-select');
      const catTxt = cat?.options[cat.selectedIndex]?.text||'';
      const cost = item.querySelector('.cost-val')?.value||'';
      const maps = item.querySelector('.maps-input')?.value||'';
      const note = item.querySelector('.notes-area')?.value||'';
      rows.push([`Day ${badgeNum} – ${dayName}`, dateInp, t, loc, catTxt, cost, maps, note]);
    });
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (document.getElementById('trip-title').value.trim()||'Itinerary') + '.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(a.href);
  showToast('CSV downloaded');
}

function downloadHTML() {
  document.querySelectorAll('input:not([type="file"]):not([type="checkbox"])').forEach(el => el.setAttribute('value', el.value));
  document.querySelectorAll('textarea').forEach(el => el.innerHTML = el.value);
  document.querySelectorAll('input[type="checkbox"]').forEach(el =>
    el.checked ? el.setAttribute('checked','') : el.removeAttribute('checked'));
  document.querySelectorAll('select').forEach(el =>
    Array.from(el.options).forEach(o =>
      o.value===el.value ? o.setAttribute('selected','') : o.removeAttribute('selected')));
  document.querySelectorAll('.mode-pill,.dc-pill').forEach(p =>
    p.classList.contains('selected') ? p.setAttribute('data-sel','1') : p.removeAttribute('data-sel'));
  document.querySelectorAll('.expand-sec').forEach(s =>
    s.style.display==='block' ? s.setAttribute('data-open','1') : s.removeAttribute('data-open'));
  document.querySelectorAll('.dow-badge').forEach(b =>
    b.textContent ? b.setAttribute('data-dow', b.textContent) : b.removeAttribute('data-dow'));
  const coverImg = document.getElementById('main-cover');
  if (coverImg?.src?.startsWith('data:')) { coverImg.setAttribute('src', coverImg.src); coverImg.style.display='block'; }
  const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (document.getElementById('trip-title').value.trim()||'Itinerary') + '.html';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(a.href);
  showToast('HTML downloaded');
}

/* ══ PDF ══ */
function buildPDFHTML() {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = '';
  const coverSrc = document.getElementById('main-cover').src;
  const title = document.getElementById('trip-title').value;
  const sub = document.getElementById('trip-subtitle').value;
  html += `<div class="p-cover">`;
  if (coverSrc && coverSrc.startsWith('data:')) html += `<img src="${coverSrc}">`;
  html += `</div>`;
  html += `<div class="p-title">${title||'Itinerary'}</div>`;
  if (sub) html += `<div class="p-sub">${sub}</div>`;

  document.querySelectorAll('#days-wrapper > .day-container, #days-wrapper > .day-connector').forEach(el => {
    if (el.classList.contains('day-connector')) {
      const selPill = el.querySelector('.dc-pill.selected');
      const mode = selPill ? selPill.textContent.trim() : '';
      const inputs = el.querySelectorAll('.dc-field input');
      const dist = inputs[0]?.value||'', time2 = inputs[1]?.value||'';
      html += `<div class="p-dc"><div class="p-dc-head"><div class="p-dc-moon">🌙</div><div class="p-dc-lbl">Overnight Journey</div></div><div class="p-dc-row">`;
      if (mode) html += `<span>${mode}</span>`;
      if (dist) html += `<span class="p-dc-sep">·</span><span>${dist}</span>`;
      if (time2) html += `<span class="p-dc-sep">·</span><span>${time2}</span>`;
      html += `</div></div>`;
    } else {
      const badgeNum = el.querySelector('.day-badge-num')?.value||'';
      const dayName  = el.querySelector('.day-title')?.value||'';
      const dateVal  = el.querySelector('.day-date')?.value||'';
      let dateStr='',dowStr='';
      if (dateVal) {
        const [y,mo,d2]=dateVal.split('-').map(Number), dt=new Date(y,mo-1,d2);
        dowStr=days[dt.getDay()];
        dateStr=dt.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
      }
      html += `<div class="p-day"><div class="p-day-hd"><div class="p-day-badge"><span class="p-day-badge-lbl">Day</span><span class="p-day-badge-num">${badgeNum}</span></div><span class="p-day-name">${dayName}</span>`;
      if (dateStr) html += `<span class="p-day-date">${dateStr}</span>`;
      if (dowStr)  html += `<span class="p-day-dow">${dowStr}</span>`;
      html += `</div><div class="p-stops">`;

      el.querySelectorAll('.stop-card, .transit-block').forEach(item => {
        if (item.classList.contains('transit-block')) {
          const selPill = item.querySelector('.mode-pill.selected');
          const mode = selPill ? selPill.textContent.trim() : '';
          const ti = item.querySelectorAll('.t-field input');
          const dist=ti[0]?.value||'', time2=ti[1]?.value||'';
          html += `<div class="p-transit"><span class="p-transit-icon">${mode}</span>`;
          if (dist) html += `<span class="p-transit-sep">·</span><span>${dist}</span>`;
          if (time2) html += `<span class="p-transit-sep">·</span><span>${time2}</span>`;
          html += `</div>`;
        } else {
          const time = item.querySelector('.time-input')?.value||'';
          const loc  = item.querySelector('.loc-input')?.value||'';
          const cat  = item.querySelector('.cat-select');
          const catTxt = cat ? cat.options[cat.selectedIndex]?.text||'' : '';
          const catEmoji = catTxt.split(' ')[0]||'';
          const cost = item.querySelector('.cost-val')?.value;
          const maps = item.querySelector('.maps-input')?.value||'';
          const note = item.querySelector('.notes-area')?.value||'';
          let timeFmt = time;
          if (time) { const [hh,mm]=time.split(':').map(Number); timeFmt=`${hh%12||12}:${String(mm).padStart(2,'0')} ${hh>=12?'PM':'AM'}`; }
          html += `<div class="p-stop"><div class="p-stop-dot"></div><div class="p-stop-r1">`;
          if (timeFmt) html += `<span class="p-stop-time">${timeFmt}</span>`;
          if (catEmoji) html += `<span class="p-stop-cat">${catEmoji}</span>`;
          html += `<span class="p-stop-loc">${loc||'—'}</span>`;
          if (cost) html += `<span class="p-stop-cost">₹${Number(cost).toLocaleString('en-IN')}</span>`;
          html += `</div>`;
          if (maps) html += `<div class="p-stop-r2"><span class="p-maps">${maps}</span></div>`;
          if (note) html += `<div class="p-note">${note}</div>`;
          const todos = item.querySelectorAll('.todo-item');
          if (todos.length) {
            html += `<div class="p-todos">`;
            todos.forEach(td => {
              const checked = td.querySelector('input[type="checkbox"]')?.checked;
              const txt = td.querySelector('span')?.textContent||'';
              html += `<div class="p-todo ${checked?'done':''}"><div class="p-todo-box ${checked?'chk':''}">${checked?'<span class="p-todo-chk">✓</span>':''}</div><span>${txt}</span></div>`;
            });
            html += `</div>`;
          }
          html += `</div>`;
        }
      });
      html += `</div></div>`;
    }
  });
  return html;
}

function downloadPDF() {
  const stage = document.getElementById('pdf-stage');
  stage.innerHTML = buildPDFHTML();
  stage.style.display = 'block';
  const filename = (document.getElementById('trip-title').value.trim()||'Itinerary') + '.pdf';
  html2pdf().set({
    margin:[14,12,14,12], filename,
    image:{type:'jpeg',quality:.97},
    html2canvas:{scale:2.5,useCORS:true,backgroundColor:'#07070f',windowWidth:390,scrollX:0,scrollY:-window.scrollY,logging:false},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
    pagebreak:{mode:['avoid-all','css'],before:'.p-day'}
  }).from(stage).save().then(() => { stage.style.display='none'; stage.innerHTML=''; });
}
